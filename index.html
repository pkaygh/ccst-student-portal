<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCST Portal Improved</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #loginPanel,
        #mainPortal {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        #adminPanel {
            margin-top: 20px;
            padding: 20px;
            background: #eef;
            border-radius: 5px;
        }

        input,
        button {
            margin: 10px 0;
            padding: 8px;
        }

        button {
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 3px;
        }

        button:hover {
            background-color: #45a049;
        }

        .error {
            color: red;
        }

        .success {
            color: green;
        }

        .data-container {
            margin-top: 20px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }
    </style>
</head>

<body>

    <!-- LOGIN PANEL -->
    <div id="loginPanel">
        <h2>🔐 CCST Portal Login</h2>
        <div>
            <label>Email:</label><br>
            <input type="email" id="loginEmail" placeholder="Enter your email"><br>
            <label>Password:</label><br>
            <input type="password" id="loginPassword" placeholder="Enter your password"><br>
            <button onclick="login()">Login</button>
            <p id="loginMsg"></p>
        </div>
    </div>

    <!-- MAIN PORTAL (hidden by default) -->
    <div id="mainPortal" style="display:none;">
        <h2>📊 CCST Portal</h2>
        <div id="userInfo"></div>

        <!-- ADMIN PANEL (hidden by default) -->
        <div id="adminPanel" style="display:none; margin-top:20px; padding:20px; background:#eef; border-radius:5px;">
            <h3>⚙️ Admin Dashboard</h3>
            <label>Google Sheet CSV URL:</label><br>
            <input id="sheetUrl" style="width:80%"><br><br>
            <label>Paste CSV Data:</label><br>
            <textarea id="csvData" rows="6" style="width:80%"></textarea><br><br>
            <button onclick="adminUpdateData()">💾 Update Data</button>
            <p id="adminMsg"></p>
        </div>

        <div class="data-container">
            <h3>📋 Portal Data</h3>
            <button onclick="loadAllData()">🔄 Refresh Data</button>
            <div id="dataDisplay"></div>
        </div>

        <button onclick="logout()" style="margin-top:20px;">🚪 Logout</button>
    </div>

    <script>
        // ================= INDEXEDDB SETUP =================
        const DB_NAME = "ccst_portal_db";
        const STORE_NAME = "api_cache";

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, 1);

                request.onupgradeneeded = function (e) {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains(STORE_NAME)) {
                        db.createObjectStore(STORE_NAME);
                    }
                };

                request.onsuccess = function (e) {
                    resolve(e.target.result);
                };

                request.onerror = function () {
                    reject("DB error");
                };
            });
        }

        async function saveToDB(key, value) {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, "readwrite");
            tx.objectStore(STORE_NAME).put(value, key);
        }

        async function getFromDB(key) {
            const db = await openDB();
            return new Promise((resolve) => {
                const tx = db.transaction(STORE_NAME, "readonly");
                const req = tx.objectStore(STORE_NAME).get(key);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        }

        // ================= PASSWORD HASHING =================
        function hashPassword(password) {
            return btoa(password);
        }

        // ================= GOOGLE SHEETS BACKEND =================
        class GoogleSheetBackend {
            static async fetchFromSheet(url) {
                try {
                    const response = await fetch(url);
                    const csv = await response.text();
                    const parsed = this.parseCSV(csv);

                    if (!parsed || parsed.length === 0) {
                        throw new Error("Empty data");
                    }

                    await saveToDB(url, {
                        data: parsed,
                        timestamp: Date.now()
                    });

                    return parsed;

                } catch (error) {
                    console.warn("Using cached data...", error);

                    const cached = await getFromDB(url);

                    if (cached) {
                        const ONE_HOUR = 60 * 60 * 1000;
                        if (Date.now() - cached.timestamp < ONE_HOUR) {
                            return cached.data;
                        }
                    }

                    return [];
                }
            }

            static parseCSV(csv) {
                const rows = csv.split("\n").map(row =>
                    row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)
                ).filter(row => row.length > 1);

                if (rows.length === 0) return [];

                const headers = rows[0].map(h => h.trim());

                return rows.slice(1).map(row => {
                    let obj = {};
                    headers.forEach((header, i) => {
                        obj[header] = row[i]?.trim() || '';
                    });
                    return obj;
                }).filter(obj => Object.keys(obj).length > 0);
            }
        }

        // ================= AUTHENTICATION =================
        const VALID_EMAIL = "admin@ccst.edu";
        const VALID_PASSWORD_HASH = hashPassword("admin123"); // Change this to your desired password

        function login() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            const loginMsg = document.getElementById("loginMsg");

            if (email === VALID_EMAIL && hashPassword(password) === VALID_PASSWORD_HASH) {
                loginMsg.className = "success";
                loginMsg.innerText = "✅ Login successful!";

                // Hide login, show portal
                document.getElementById("loginPanel").style.display = "none";
                document.getElementById("mainPortal").style.display = "block";

                // Show admin panel for admin user
                if (email === "admin@ccst.edu") {
                    document.getElementById("adminPanel").style.display = "block";
                }

                // Load initial data
                loadAllData();

                // Save session
                sessionStorage.setItem("loggedIn", "true");
                sessionStorage.setItem("userEmail", email);
            } else {
                loginMsg.className = "error";
                loginMsg.innerText = "❌ Invalid email or password";
            }
        }

        function logout() {
            sessionStorage.clear();
            document.getElementById("loginPanel").style.display = "block";
            document.getElementById("mainPortal").style.display = "none";
            document.getElementById("loginEmail").value = "";
            document.getElementById("loginPassword").value = "";
        }

        function checkSession() {
            if (sessionStorage.getItem("loggedIn") === "true") {
                document.getElementById("loginPanel").style.display = "none";
                document.getElementById("mainPortal").style.display = "block";

                if (sessionStorage.getItem("userEmail") === "admin@ccst.edu") {
                    document.getElementById("adminPanel").style.display = "block";
                }

                loadAllData();
            }
        }

        // ================= DATA LOADING =================
        const SHEET_URLS = [
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vShFf9n8AEPXewltjnngnQBMcrVfAAYABqVDF5ruwcaXer8-WASFHJ0hpPxxrvdzYJBSv6AW4gy37oT/pub?gid=0&single=true&output=csv",
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vShFf9n8AEPXewltjnngnQBMcrVfAAYABqVDF5ruwcaXer8-WASFHJ0hpPxxrvdzYJBSv6AW4gy37oT/pub?gid=731468635&single=true&output=csv",
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vShFf9n8AEPXewltjnngnQBMcrVfAAYABqVDF5ruwcaXer8-WASFHJ0hpPxxrvdzYJBSv6AW4gy37oT/pub?gid=723771609&single=true&output=csv",
            "https://docs.google.com/spreadsheets/d/e/2PACX-1vShFf9n8AEPXewltjnngnQBMcrVfAAYABqVDF5ruwcaXer8-WASFHJ0hpPxxrvdzYJBSv6AW4gy37oT/pub?gid=1945837782&single=true&output=csv"
        ];

        async function loadAllData() {
            const dataDisplay = document.getElementById("dataDisplay");
            dataDisplay.innerHTML = "<p>Loading data...</p>";

            let allData = [];

            for (let i = 0; i < SHEET_URLS.length; i++) {
                const data = await GoogleSheetBackend.fetchFromSheet(SHEET_URLS[i]);
                if (data && data.length > 0) {
                    allData.push({ sheet: i + 1, data: data });
                }
            }

            if (allData.length === 0) {
                dataDisplay.innerHTML = "<p>No data available. Please check your sheet URLs.</p>";
                return;
            }

            // Display data
            let html = "";
            allData.forEach(sheet => {
                html += `<h4>Sheet ${sheet.sheet}</h4>`;
                if (sheet.data.length > 0) {
                    const headers = Object.keys(sheet.data[0]);
                    html += "<table><thead><tr>";
                    headers.forEach(header => {
                        html += `<th>${header}</th>`;
                    });
                    html += "</tr></thead><tbody>";

                    sheet.data.slice(0, 10).forEach(row => { // Show first 10 rows
                        html += "<tr>";
                        headers.forEach(header => {
                            html += `<td>${row[header] || ''}</td>`;
                        });
                        html += "</tr>";
                    });

                    if (sheet.data.length > 10) {
                        html += `<tr><td colspan="${headers.length}">... and ${sheet.data.length - 10} more rows</td></tr>`;
                    }

                    html += "</tbody></table><br>";
                } else {
                    html += "<p>No data in this sheet</p>";
                }
            });

            dataDisplay.innerHTML = html;
        }

        // ================= ADMIN UPDATE =================
        async function adminUpdateData() {
            const url = document.getElementById("sheetUrl").value;
            const csv = document.getElementById("csvData").value;
            const adminMsg = document.getElementById("adminMsg");

            if (!url || !csv) {
                adminMsg.innerText = "❌ Fill all fields";
                adminMsg.className = "error";
                return;
            }

            const parsed = GoogleSheetBackend.parseCSV(csv);

            if (parsed.length === 0) {
                adminMsg.innerText = "❌ Invalid CSV data";
                adminMsg.className = "error";
                return;
            }

            await saveToDB(url, {
                data: parsed,
                timestamp: Date.now()
            });

            adminMsg.innerText = "✅ Data updated successfully";
            adminMsg.className = "success";

            // Reload data
            setTimeout(() => {
                loadAllData();
            }, 500);
        }

        // ================= AUTO REFRESH =================
        window.addEventListener("online", () => {
            console.log("Back online. Refreshing data...");
            if (sessionStorage.getItem("loggedIn") === "true") {
                loadAllData();
            }
        });

        // Load data on initial page load if session exists
        window.addEventListener("load", () => {
            checkSession();
        });

        console.log("✅ Portal ready");
    </script>

</body>

</html>
